<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>NauGram - Chats</title>
</head>
<body>
<!-- Sidebar with chat list -->
<div class="sidebar">
    <div class="chats-list">
        <!-- Iterate over chats with onclick redirect -->
        <div th:each="chat : ${chats}"
             class="chat-item"
             th:onclick="'window.location.href=\'/chats/' + ${chat.id} + '\''">
            <div class="chat-avatar">
                <span th:text="${chat.chatName != null ? #strings.substring(chat.chatName, 0, 1) : '?'}">?</span>
            </div>
            <div class="chat-info">
                <div class="chat-name">
                    <span th:text="${chat.chatName != null ? chat.chatName : 'Unnamed Chat'}">Chat Name</span>
                </div>
                <div class="chat-last-msg">
                    ID: <span th:text="${chat.id}">1</span> | Type: <span th:text="${chat.chatType}">type</span>
                </div>
            </div>
        </div>

        <!-- Show message when no chats -->
        <div th:if="${#lists.isEmpty(chats)}">
            No chats available
        </div>
    </div>
</div>

<!-- Main content area -->
<div class="main-content">
    <!-- Welcome message - visible when no chat is selected -->
    <div id="welcomeMessage" th:if="${selectedChat == null}">
        <h2>Welcome to NauGram</h2>
        <p>Select a chat to start messaging</p>
        <p>Total chats: <span th:text="${chatCount}">0</span></p>
    </div>

    <!-- Chat window - visible when chat is selected -->
    <div id="chatWindow" th:if="${selectedChat != null}">
        <!-- Chat Header -->
        <div class="chat-header">
            <button onclick="window.location.href='/chats'">← Back</button>
            <div class="chat-avatar">
                <span th:text="${selectedChat.chatName != null ? #strings.substring(selectedChat.chatName, 0, 1) : '?'}">?</span>
            </div>
            <div>
                <h3 th:text="${selectedChat.chatName != null ? selectedChat.chatName : 'Unnamed Chat'}">Chat Name</h3>
                <p>
                    ID: <span th:text="${selectedChat.id}">1</span> |
                    Type: <span th:text="${selectedChat.chatType}">type</span>
                </p>
            </div>
        </div>

        <!-- Messages Area -->
        <div id="messagesContainer">

        </div>

        <!-- Message Input Area -->
        <div>
            <input id="messageInput" type="text" placeholder="Type a message...">
            <button th:onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script th:inline="javascript">

    const initialMessages =
        /*[[${messages}]]*/ [];

    for (let m of initialMessages){
        displayMessage(m)
    }

    let stompClient = null;

    // Current selected chat id from thymeleaf
    const currentChatId = /*[[${selectedChat != null ? selectedChat.id : null}]]*/ null;

    function connect() {

        const socket = new SockJS('/ws');

        stompClient = Stomp.over(socket);

        stompClient.connect({}, function (frame) {

            console.log("Connected: " + frame);

            // Subscribe only if chat page is opened
            if (currentChatId !== null) {
                subscribeToChat(currentChatId);
            }

        }, function (error) {
            console.error("STOMP error:", error);
        });
    }

    function disconnect() {

        if (stompClient !== null) {
            stompClient.disconnect();
        }

        console.log("Disconnected");
    }

    // SEND MESSAGE
    function sendMessage() {

        if (currentChatId === null) {
            return;
        }

        const input = document.getElementById("messageInput");

        const text = input.value.trim();

        if (text === "") {
            return;
        }

        // Must match your MessageDTO fields
        const messageDTO = {
            chatId: currentChatId,
            text: text,
            repliedToMessageId: null
        };

        console.log("Sending:", messageDTO);

        stompClient.send(
            "/app/chat.send",
            {},
            JSON.stringify(messageDTO)
        );

        // clear input
        input.value = "";
    }

    // RECEIVE MESSAGES
    function subscribeToChat(chatId) {

        stompClient.subscribe(
            "/user/queue/chat/" + chatId,
            function (message) {

                const msg = JSON.parse(message.body);

                console.log("Received:", msg);

                displayMessage(msg);
            }
        );
    }

    // DISPLAY MESSAGE
    function displayMessage(message) {

        const container =
            document.getElementById("messagesContainer");

        const div = document.createElement("div");

        div.className = "message received";

        let time = "";

        if (message.timestamp) {

            time = new Date(message.timestamp)
                .toLocaleTimeString([], {
                    hour: '2-digit',
                    minute: '2-digit'
                });
        }

        div.innerHTML = `<div><strong>${message.sender}</strong> ${message.text} <span>${time}</span></div>`;

        container.appendChild(div);

        container.scrollTop =
            container.scrollHeight;
    }

    // SEND ON ENTER
    document.addEventListener("DOMContentLoaded", function () {

        const input = document.getElementById("messageInput");

        if (input) {

            input.addEventListener("keypress", function (event) {

                if (event.key === "Enter") {
                    event.preventDefault();
                    sendMessage();
                }

            });

        }

        connect();
    });

    // Disconnect on page leave
    window.addEventListener("beforeunload", function () {
        disconnect();
    });

</script>
</body>
</html>
