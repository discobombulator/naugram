<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>NauGram - Chat</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f7f9fb;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-page-header {
            height: 64px;
            background: white;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            padding: 0 18px;
            gap: 14px;
            flex-shrink: 0;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 12px;
            background: #fff4ed;
            color: #f5833d;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.2s;
        }

        .back-btn:hover {
            background: #f5833d22;
            transform: translateX(-2px);
        }

        .chat-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #f5833d;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            flex-shrink: 0;
            overflow: hidden;
        }

        .chat-avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .chat-header-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-title {
            color: #333;
            font-size: 17px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-subtitle {
            color: #aaa;
            font-size: 13px;
            margin-top: 2px;
        }

        .chat-layout {
            flex: 1;
            overflow: hidden;
            background: #f7f9fb;
        }

        .chat-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #f7f9fb;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 28px 12%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .messages-container::-webkit-scrollbar {
            width: 5px;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: #f5833d44;
            border-radius: 10px;
        }

        .message-row {
            display: flex;
            width: 100%;
        }

        .message-row.received {
            justify-content: flex-start;
        }

        .message-row.sent {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 420px;
            padding: 11px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.4;
            word-break: break-word;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
        }

        .message-row.received .message-bubble {
            background: white;
            color: #222;
            border: 1px solid #eee;
            border-bottom-left-radius: 5px;
        }

        .message-row.sent .message-bubble {
            background: #f5833d;
            color: white;
            border-bottom-right-radius: 5px;
        }

        .message-sender {
            font-size: 12px;
            font-weight: 700;
            color: #666;
            margin-bottom: 5px;
        }

        .message-text {
            white-space: pre-wrap;
        }

        .message-time {
            margin-top: 6px;
            font-size: 11px;
            opacity: 0.75;
            text-align: right;
        }

        .chat-input-area {
            background: white;
            border-top: 1px solid #eee;
            padding: 14px 12%;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .message-input {
            flex: 1;
            height: 46px;
            border: 2px solid #f5833d33;
            border-radius: 14px;
            outline: none;
            padding: 0 15px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .message-input:focus {
            border-color: #f5833d;
        }

        .send-btn {
            min-width: 120px;
            height: 46px;
            border: none;
            border-radius: 14px;
            background: #f5833d;
            color: white;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }

        .send-btn:hover {
            background: #d96d2e;
        }

        .empty-chat {
            margin: auto;
            color: #aaa;
            text-align: center;
            font-size: 15px;
        }
        .media-btn {
            width: 46px;
            min-width: 46px;
            height: 46px;
            border: 2px solid #f5833d33;
            border-radius: 14px;
            background: white;
            color: #f5833d;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s, background 0.2s, transform 0.2s;
            font-family: inherit;
        }

        .media-btn:hover {
            border-color: #f5833d;
            background: #fff4ed;
            transform: translateY(-1px);
        }

        .media-btn svg {
            display: block;
        }

        .message-bubble.media-bubble {
            padding: 6px;
            max-width: 300px;
            background: transparent;
            box-shadow: none;
        }

        .message-row.sent .message-bubble.media-bubble {
            background: transparent;
        }

        .message-row.received .message-bubble.media-bubble {
            background: transparent;
            border: none;
        }

        .message-media-img {
            display: block;
            width: auto;
            height: auto;
            max-width: 280px;
            max-height: 280px;
            object-fit: contain;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.10);
        }

        .message-media-video {
            display: block;
            width: auto;
            height: auto;
            max-width: 320px;
            max-height: 280px;
            border-radius: 14px;
            background: black;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.10);
        }

        .media-caption {
            margin-top: 6px;
            padding: 0 4px 2px;
            font-size: 12px;
            opacity: 0.75;
            word-break: break-word;
        }

        @media (max-width: 768px) {
            .chat-page-header {
                padding: 0 10px;
                gap: 10px;
            }

            .messages-container {
                padding: 18px 12px;
            }

            .chat-input-area {
                padding: 12px;
            }

            .message-bubble {
                max-width: 78%;
            }

            .send-btn {
                min-width: 90px;
            }

            .media-btn {
                width: 44px;
                min-width: 44px;
                height: 44px;
            }

            .message-bubble.media-bubble {
                max-width: 74vw;
            }

            .message-media-img {
                max-width: 72vw;
                max-height: 240px;
            }

            .message-media-video {
                max-width: 72vw;
                max-height: 240px;
            }
        }
    </style>
</head>

<body>

<header class="chat-page-header">
    <button class="back-btn" onclick="window.location.href='/'">←</button>

    <div class="chat-avatar">
        <img th:if="${companionProfile != null
                     && companionProfile.profileImagePath != null
                     && !companionProfile.profileImagePath.isBlank()}"
             th:src="${companionProfile.profileImagePath}"
             class="chat-avatar-img"
             alt="Avatar">

        <span th:if="${companionProfile == null
                      || companionProfile.profileImagePath == null
                      || companionProfile.profileImagePath.isBlank()}"
              th:text="${companion != null && companion.username != null && !companion.username.isBlank()
                    ? #strings.substring(companion.username, 0, 1).toUpperCase()
                    : (selectedChat.chatName != null && !selectedChat.chatName.isBlank()
                        ? #strings.substring(selectedChat.chatName, 0, 1).toUpperCase()
                        : 'Ч')}">
            Ч
        </span>
    </div>

    <div class="chat-header-info">
        <div class="chat-title"
             th:text="${companion != null && companion.username != null && !companion.username.isBlank()
                ? '@' + companion.username
                : (selectedChat.chatName != null && !selectedChat.chatName.isBlank()
                    ? selectedChat.chatName
                    : 'Чат #' + selectedChat.id)}">
            Название чата
        </div>

        <div class="chat-subtitle">
            <span th:text="${selectedChat.chatType == 'direct' ? 'Личный чат' : 'Групповой чат'}">
                Тип чата
            </span>
        </div>
    </div>
</header>

<main class="chat-layout">
    <div class="chat-container">

        <div id="messagesContainer" class="messages-container">
            <div th:if="${messages == null || #lists.isEmpty(messages)}"
                 class="empty-chat"
                 id="emptyChat">
                Сообщений пока нет
            </div>
        </div>

        <div class="chat-input-area">
            <input id="mediaInput"
                   type="file"
                   accept="image/png,image/jpeg,image/webp,image/gif,video/mp4,video/webm"
                   style="display: none;"
                   onchange="uploadMedia()">

            <button class="media-btn"
                    onclick="document.getElementById('mediaInput').click()"
                    type="button"
                    title="Прикрепить файл">
                <svg width="21"
                     height="21"
                     viewBox="0 0 24 24"
                     fill="none"
                     stroke="currentColor"
                     stroke-width="2"
                     stroke-linecap="round"
                     stroke-linejoin="round">
                    <path d="M21.44 11.05 12.25 20.24a6 6 0 0 1-8.49-8.49L13.5 2.01a4 4 0 0 1 5.66 5.66L9.41 17.41a2 2 0 0 1-2.83-2.83L15.07 6.1"></path>
                </svg>
            </button>

            <input id="messageInput"
                   class="message-input"
                   type="text"
                   placeholder="Введите сообщение...">

            <button class="send-btn" onclick="sendMessage()">Отправить</button>
        </div>

    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script th:inline="javascript">
    const initialMessages = /*[[${messages}]]*/ [];
    const currentChatId = /*[[${selectedChat != null ? selectedChat.id : null}]]*/ null;
    const currentUserId = /*[[${currentUserId}]]*/ null;

    let stompClient = null;

    document.addEventListener("DOMContentLoaded", function () {
        for (let message of initialMessages) {
            displayMessage(message);
        }

        connect();

        const input = document.getElementById("messageInput");

        if (input) {
            input.addEventListener("keypress", function (event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    sendMessage();
                }
            });
        }
    });

    function connect() {
        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function () {
            if (currentChatId !== null) {
                subscribeToChat(currentChatId);
            }
        }, function (error) {
            console.error("STOMP error:", error);
        });
    }

    function subscribeToChat(chatId) {
        stompClient.subscribe("/user/queue/chat/" + chatId, function (message) {
            const msg = JSON.parse(message.body);
            displayMessage(msg);
        });
    }

    function sendMessage() {
        if (currentChatId === null || stompClient === null) {
            return;
        }

        const input = document.getElementById("messageInput");
        const text = input.value.trim();

        if (text === "") {
            return;
        }

        const messageDTO = {
            chatId: currentChatId,
            text: text
        };

        stompClient.send(
            "/app/chat.send",
            {},
            JSON.stringify(messageDTO)
        );

        input.value = "";
    }

    function displayMessage(message) {
        const emptyChat = document.getElementById("emptyChat");

        if (emptyChat) {
            emptyChat.remove();
        }

        const container = document.getElementById("messagesContainer");

        const row = document.createElement("div");
        const isMine = Number(message.senderId) === Number(currentUserId);

        row.className = "message-row " + (isMine ? "sent" : "received");

        let time = "";

        if (message.timestamp) {
            time = new Date(message.timestamp).toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit"
            });
        }

        const messageContent = buildMessageContent(message);

        const type = message.messageType || "TEXT";
        const bubbleClass = type === "IMAGE" || type === "VIDEO"
            ? "message-bubble media-bubble"
            : "message-bubble";

        row.innerHTML = `
    <div class="${bubbleClass}">
        ${!isMine ? `<div class="message-sender">${escapeHtml(message.sender)}</div>` : ""}
        ${messageContent}
        <div class="message-time">${time}</div>
    </div>
`;

        container.appendChild(row);
        container.scrollTop = container.scrollHeight;
    }

    function buildMessageContent(message) {
        const type = message.messageType || "TEXT";

        if (type === "IMAGE") {
            return `
            <img class="message-media-img"
                 src="${escapeAttribute(message.mediaUrl)}"
                 alt="${escapeAttribute(message.mediaOriginalName || 'image')}">
        `;
        }

        if (type === "VIDEO") {
            return `
            <video class="message-media-video" controls>
                <source src="${escapeAttribute(message.mediaUrl)}"
                        type="${escapeAttribute(message.mediaContentType || 'video/mp4')}">
                Ваш браузер не поддерживает видео.
            </video>
            ${message.mediaOriginalName ? `<div class="media-caption">${escapeHtml(message.mediaOriginalName)}</div>` : ""}
        `;
        }

        return `<div class="message-text">${escapeHtml(message.text)}</div>`;
    }

    function escapeAttribute(value) {
        if (value === null || value === undefined) {
            return "";
        }

        return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll('"', "&quot;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;");
    }

    function escapeHtml(value) {
        if (value === null || value === undefined) {
            return "";
        }

        return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }

    window.addEventListener("beforeunload", function () {
        if (stompClient !== null) {
            stompClient.disconnect();
        }
    });

    function uploadMedia() {
        if (currentChatId === null) {
            return;
        }

        const input = document.getElementById("mediaInput");
        const file = input.files[0];

        if (!file) {
            return;
        }

        const formData = new FormData();
        formData.append("file", file);

        fetch("/chats/" + currentChatId + "/media", {
            method: "POST",
            body: formData
        })
            .then(response => {
                if (!response.ok) {
                    throw new Error("Не удалось загрузить файл");
                }

                return response.json();
            })
            .then(() => {
                input.value = "";
            })
            .catch(error => {
                console.error(error);
                alert(error.message);
                input.value = "";
            });
    }
</script>

</body>
</html>
