<!-- src/main/resources/templates/chat.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f9fb;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 350px;
            background: white;
            border-right: 2px solid #f5833d33;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .settings-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #f5833d;
            font-size: 24px;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .settings-btn:hover {
            transform: rotate(45deg);
        }

        .search-wrapper {
            position: relative;
        }

        .search-input {
            width: 100%;
            height: 45px;
            background: #f1f1f1;
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 0 15px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        .search-input:focus {
            border-color: #f5833d;
            background: white;
        }

        /* Список чатов */
        .chats-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 1px solid #f9f9f9;
        }

        .chat-item:hover {
            background-color: #fff4ed;
        }

        .chat-avatar {
            width: 55px;
            height: 55px;
            background-color: #f5833d;
            border-radius: 50%;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            overflow: hidden;
        }

        .chat-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }

        .chat-time {
            font-size: 12px;
            color: #999;
            font-weight: normal;
        }

        .chat-last-msg {
            font-size: 14px;
            color: #777;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f7f9fb;
            position: relative;
        }

        .welcome-msg {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #f5833d33;
        }

        .welcome-msg h2 {
            color: #f5833d;
            margin-top: 0;
        }

        /* Скроллбар в оранжевом стиле */
        .chats-list::-webkit-scrollbar {
            width: 6px;
        }
        .chats-list::-webkit-scrollbar-thumb {
            background: #f5833d55;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="chats-list">
        <!-- Iterate over chats with onclick redirect -->
        <div th:each="chat : ${chats}"
             class="chat-item"
             th:onclick="'window.location.href=\'/chats/' + ${chat.id} + '\''">
            <div class="chat-avatar">
                <!-- Show first letter of chat name or "?" if null -->
                <span th:text="${chat.chatName != null ? #strings.substring(chat.chatName, 0, 1) : '?'}">?</span>
            </div>
            <div class="chat-info">
                <div class="chat-name">
                    <!-- Chat name with fallback -->
                    <span th:text="${chat.chatName != null ? chat.chatName : 'Unnamed Chat'}">Chat Name</span>
                </div>
                <!-- Chat ID and type -->
                <div class="chat-last-msg">
                    ID: <span th:text="${chat.id}">1</span> | Type: <span th:text="${chat.chatType}">type</span>
                </div>
            </div>
        </div>

        <!-- Show message when no chats -->
        <div th:if="${#lists.isEmpty(chats)}" style="padding: 20px; text-align: center; color: #999;">
            No chats available
        </div>
    </div>
</div>

<div class="main-content">
    <div class="welcome-msg">
        <h2>Welcome to NauGram</h2>
        <p>Select a chat to start messaging</p>
        <p>Total chats: <span th:text="${chatCount}">0</span></p>
    </div>
</div>
</body>
</html>
