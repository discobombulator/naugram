<!DOCTYPE html>
<html>
<head>
    <title>Multi-Room Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Chat List Sidebar */
        .sidebar {
            width: 280px;
            background: #fff;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            background: #075e54;
            color: white;
        }

        .sidebar-header h2 {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .create-room {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .create-room input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            margin-bottom: 10px;
        }

        .create-room button {
            width: 100%;
            padding: 10px;
            background: #075e54;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }

        .room-list {
            flex: 1;
            overflow-y: auto;
        }

        .room-item {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .room-item:hover {
            background: #f5f5f5;
        }

        .room-item.active {
            background: #e8f5e9;
            border-left: 4px solid #075e54;
        }

        .room-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .room-users {
            font-size: 12px;
            color: #666;
        }

        .delete-room {
            color: #ff4444;
            cursor: pointer;
            padding: 5px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .room-item:hover .delete-room {
            opacity: 1;
        }

        /* Main Chat Area */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px;
            background: #075e54;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h3 {
            font-size: 18px;
        }

        .online-count {
            font-size: 12px;
            opacity: 0.8;
        }

        .messages-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #e5ddd5;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message-header {
            font-size: 12px;
            color: #666;
            margin-bottom: 3px;
        }

        .message-content {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 15px;
            word-wrap: break-word;
        }

        .message.sent .message-content {
            background: #dcf8c6;
            align-self: flex-end;
        }

        .message.received .message-content {
            background: white;
        }

        .message.system {
            align-items: center;
        }

        .message.system .message-content {
            background: #e1f3fb;
            color: #666;
            font-style: italic;
            max-width: 100%;
            text-align: center;
            font-size: 13px;
        }

        .input-area {
            padding: 20px;
            background: #f0f0f0;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 25px;
            outline: none;
        }

        .input-area button {
            padding: 12px 25px;
            background: #075e54;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }

        .input-area button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .no-chat-selected {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            font-size: 18px;
        }

        .leave-button {
            padding: 8px 15px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>💬 Chat Rooms</h2>
            <div style="font-size: 12px; opacity: 0.8;" id="userInfo"></div>
        </div>

        <div class="create-room">
            <input type="text" id="roomIdInput" placeholder="Enter Room ID...">
            <input type="text" id="usernameInput" placeholder="Your username...">
            <button onclick="joinRoom()">Join Room</button>
        </div>

        <div class="room-list" id="roomList">
            <!-- Rooms will be added here -->
        </div>
    </div>

    <!-- Main Chat -->
    <div class="main-chat">
        <div id="chatContainer">
            <div class="no-chat-selected">
                <div style="text-align: center;">
                    <div style="font-size: 48px; margin-bottom: 20px;">💬</div>
                    <h3>Select or Join a Chat Room</h3>
                    <p style="margin-top: 10px; font-size: 14px;">Enter a Room ID and username to get started</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Room management
    const rooms = new Map(); // roomId -> { ws, messages, users }
    let currentRoom = null;

    function joinRoom() {
        const roomId = document.getElementById('roomIdInput').value.trim();
        const username = document.getElementById('usernameInput').value.trim();

        if (!roomId) {
            alert('Please enter a Room ID');
            return;
        }
        if (!username) {
            alert('Please enter a username');
            return;
        }

        if (rooms.has(roomId)) {
            alert('Already connected to this room');
            return;
        }

        // Connect to room
        connectToRoom(roomId, username);
        document.getElementById('roomIdInput').value = '';
        document.getElementById('usernameInput').value = '';
    }

    function connectToRoom(roomId, username) {
        const ws = new WebSocket(`ws://localhost:8080/chat/${roomId}?username=${encodeURIComponent(username)}`);

        rooms.set(roomId, {
            ws: ws,
            username: username,
            messages: [],
            users: new Set()
        });

        ws.onopen = function() {
            console.log(`Connected to room: ${roomId}`);
            addRoomToList(roomId);
            switchToRoom(roomId);
        };

        ws.onmessage = function(event) {
            handleMessage(roomId, event.data);
        };

        ws.onclose = function() {
            handleDisconnect(roomId);
        };

        ws.onerror = function(error) {
            console.error(`Error in room ${roomId}:`, error);
        };
    }

    function handleMessage(roomId, data) {
        const room = rooms.get(roomId);
        if (!room) return;

        let message;

        // Check if it's a system message (online users update)
        if (data.startsWith('ONLINE_USERS:')) {
            const users = data.substring(13).split(',');
            room.users = new Set(users);
            updateRoomInfo(roomId);
            updateOnlineCount(roomId);
            return;
        }

        // Parse regular message
        try {
            message = JSON.parse(data);
        } catch {
            // Plain text message
            message = {
                type: 'message',
                username: 'System',
                content: data
            };
        }

        room.messages.push(message);

        if (currentRoom === roomId) {
            displayMessage(message);
        }
    }

    function displayMessage(message) {
        const messagesDiv = document.getElementById('messages-' + currentRoom);
        if (!messagesDiv) return;

        const room = rooms.get(currentRoom);
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message';

        if (message.type === 'system') {
            messageDiv.classList.add('system');
            messageDiv.innerHTML = `<div class="message-content">${message.content}</div>`;
        } else {
            const isSentByMe = message.username === room.username;
            messageDiv.classList.add(isSentByMe ? 'sent' : 'received');
            messageDiv.innerHTML = `
                    <div class="message-header">${message.username}</div>
                    <div class="message-content">${message.content}</div>
                `;
        }

        messagesDiv.appendChild(messageDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function handleDisconnect(roomId) {
        const room = rooms.get(roomId);
        if (room) {
            alert(`Disconnected from room: ${roomId}`);
            leaveRoom(roomId);
        }
    }

    function addRoomToList(roomId) {
        const roomList = document.getElementById('roomList');
        const roomDiv = document.createElement('div');
        roomDiv.className = 'room-item';
        roomDiv.id = 'room-' + roomId;
        roomDiv.onclick = () => switchToRoom(roomId);
        roomDiv.innerHTML = `
                <div>
                    <div class="room-name">#${roomId}</div>
                    <div class="room-users">0 users online</div>
                </div>
                <span class="delete-room" onclick="event.stopPropagation(); leaveRoom('${roomId}')">✕</span>
            `;
        roomList.appendChild(roomDiv);
    }

    function switchToRoom(roomId) {
        currentRoom = roomId;

        // Update active state
        document.querySelectorAll('.room-item').forEach(item => {
            item.classList.remove('active');
        });
        document.getElementById('room-' + roomId)?.classList.add('active');

        // Update main chat area
        updateChatView(roomId);
    }

    function updateChatView(roomId) {
        const room = rooms.get(roomId);
        if (!room) return;

        const chatContainer = document.getElementById('chatContainer');
        chatContainer.innerHTML = `
                <div class="chat-header">
                    <div>
                        <h3>#${roomId}</h3>
                        <div class="online-count">${room.users.size} users online</div>
                    </div>
                    <button class="leave-button" onclick="leaveRoom('${roomId}')">Leave Room</button>
                </div>
                <div class="messages-area" id="messages-${roomId}">
                    ${room.messages.map(msg => {
            if (msg.type === 'system') {
                return `<div class="message system"><div class="message-content">${msg.content}</div></div>`;
            } else {
                const isSentByMe = msg.username === room.username;
                const msgClass = isSentByMe ? 'sent' : 'received';
                return `<div class="message ${msgClass}">
                                <div class="message-header">${msg.username}</div>
                                <div class="message-content">${msg.content}</div>
                            </div>`;
            }
        }).join('')}
                </div>
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="Type your message..."
                           onkeypress="if(event.key==='Enter') sendMessage('${roomId}')">
                    <button onclick="sendMessage('${roomId}')">Send</button>
                </div>
            `;

        // Scroll to bottom
        const messagesDiv = document.getElementById('messages-' + roomId);
        if (messagesDiv) {
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            document.getElementById('messageInput')?.focus();
        }
    }

    function sendMessage(roomId) {
        const input = document.getElementById('messageInput');
        const message = input.value.trim();

        if (!message) return;

        const room = rooms.get(roomId);
        if (room && room.ws.readyState === WebSocket.OPEN) {
            const messageObj = {
                type: 'message',
                content: message,
                timestamp: new Date().toISOString()
            };
            room.ws.send(JSON.stringify(messageObj));
            input.value = '';
        }
    }

    function leaveRoom(roomId) {
        const room = rooms.get(roomId);
        if (room) {
            room.ws.close();
            rooms.delete(roomId);
        }

        // Remove from UI
        const roomElement = document.getElementById('room-' + roomId);
        if (roomElement) {
            roomElement.remove();
        }

        // Switch to another room if available
        if (currentRoom === roomId) {
            const remainingRooms = Array.from(rooms.keys());
            if (remainingRooms.length > 0) {
                switchToRoom(remainingRooms[0]);
            } else {
                currentRoom = null;
                document.getElementById('chatContainer').innerHTML = `
                        <div class="no-chat-selected">
                            <div style="text-align: center;">
                                <div style="font-size: 48px; margin-bottom: 20px;">💬</div>
                                <h3>Select or Join a Chat Room</h3>
                                <p style="margin-top: 10px; font-size: 14px;">Enter a Room ID and username to get started</p>
                            </div>
                        </div>
                    `;
            }
        }
    }

    function updateRoomInfo(roomId) {
        const room = rooms.get(roomId);
        const roomElement = document.getElementById('room-' + roomId);
        if (roomElement && room) {
            const usersDiv = roomElement.querySelector('.room-users');
            if (usersDiv) {
                usersDiv.textContent = `${room.users.size} users online`;
            }
        }
    }

    function updateOnlineCount(roomId) {
        if (currentRoom === roomId) {
            const room = rooms.get(roomId);
            const onlineCount = document.querySelector('.online-count');
            if (onlineCount && room) {
                onlineCount.textContent = `${room.users.size} users online`;
            }
        }
    }

    // Handle page unload
    window.addEventListener('beforeunload', () => {
        rooms.forEach((room, roomId) => {
            room.ws.close();
        });
    });
</script>
</body>
</html>
