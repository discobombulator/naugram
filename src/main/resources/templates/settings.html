<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NauGram - Настройки</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f9fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .settings-container {
            width: 90%;
            max-width: 500px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #f5833d33;
            text-align: left;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .back-btn {
            text-decoration: none;
            color: #f5833d;
            font-size: 24px;
            font-weight: bold;
        }

        .title {
            color: #f5833d;
            font-size: 24px;
            font-weight: bold;
            margin: 0;
        }

        .section-title {
            font-size: 14px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 20px 0 10px 5px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .settings-input, .settings-select {
            width: 100%;
            height: 60px;
            padding: 0 20px;
            font-size: 16px;
            border: 2px solid #f5833d;
            border-radius: 12px;
            outline: none;
            box-sizing: border-box;
            background: white;
            color: #333;
        }

        .settings-select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23f5833d' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 20px center;
            background-size: 16px;
            cursor: pointer;
        }

        .save-btn {
            width: 100%;
            height: 60px;
            background-color: #f5833d;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        .save-btn:hover {
            background-color: #d16b2a;
        }

        .logout-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #ff4d4d;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="settings-container">
    <div class="header">
        <a href="/index" class="back-btn">←</a>
        <h1 class="title">Настройки</h1>
    </div>

    <form action="/save-settings" method="POST">
        <div class="section-title">Интерфейс</div>
        <div class="input-group">
            <select name="language" class="settings-select">
                <option value="ru">Русский (Russian)</option>
                <option value="en">English (Английский)</option>
            </select>
        </div>

        <div class="section-title">Безопасность</div>
        <div class="input-group">
            <input type="password" name="old-password" class="settings-input" placeholder="Текущий пароль">
        </div>
        <div class="input-group">
            <input type="password" name="new-password" class="settings-input" placeholder="Новый пароль">
        </div>

        <button type="submit" class="save-btn">Сохранить изменения</button>
    </form>

    <a href="/logout" class="logout-link">Выйти из аккаунта</a>
</div>

</body>
</html>
